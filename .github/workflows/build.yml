name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: BehaviorTreeMonitor-linux
          - os: windows-latest
            artifact: BehaviorTreeMonitor-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: npx vue-tsc -b --noEmit

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Python syntax check
        run: uv run python -m py_compile main.py && uv run python -m py_compile bt_monitor/protocol.py && uv run python -m py_compile bt_monitor/server.py && uv run python -m py_compile bt_monitor/app.py

      - name: Build with PyInstaller
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run pyinstaller --clean --noconfirm bt_monitor.spec

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/BehaviorTreeMonitor*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
